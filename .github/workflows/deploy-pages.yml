name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Autorisations nécessaires pour activer et déployer Pages via le token du workflow
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Préparation du site (contenu public uniquement)
        run: |
          mkdir -p public
          cp index.html public/index.html

      - name: Configuration de Pages (activation automatique si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empaquetage du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Déploiement vers GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
